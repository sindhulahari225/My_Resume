<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sindhu Lahari | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

html{ scroll-behavior:smooth; }

body{
  background:#f5f5f7;
  color:#111;
  transition:0.4s;
  overflow-x:hidden;
}

/* ---------------- DARK MODE ---------------- */
body.dark{
  background:#0d0d0d;
  color:#fff;
}

/* NAVIGATION */
.floating-nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  padding:14px 30px;
  border-radius:50px;
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.6);
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
  z-index:1000;
  transition:0.4s;
}

body.dark .floating-nav{
  background:rgba(30,30,30,0.7);
}

.floating-nav a{
  text-decoration:none;
  font-size:14px;
  color:inherit;
}

.toggle{
  cursor:pointer;
  font-size:16px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

.hero h1{
  font-size:clamp(28px,5vw,48px);
  font-weight:700;
  background:linear-gradient(90deg,#4facfe,#00f2fe,#ff6ec4,#ffdd00);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gradientText 5s linear infinite;
}

body.dark .hero h1{
  background:linear-gradient(90deg,#4facfe,#ff6ec4,#00f2fe,#ffdd00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

@keyframes gradientText{
  0%{background-position:0%;}
  50%{background-position:100%;}
  100%{background-position:0%;}
}

.download-btn{
  margin-top:25px;
  padding:14px 35px;
  border-radius:50px;
  text-decoration:none;
  background:#111;
  color:white;
  display:inline-block;
  transition:0.3s;
}

body.dark .download-btn{
  background:white;
  color:black;
}

.download-btn:hover{
  transform:scale(1.08);
}

/* SECTION */
.section{
  padding:120px 20px;
  text-align:center;
}

.section h2{
  font-size:34px;
  margin-bottom:60px;
}

/* GRID */
.skills-grid,
.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  max-width:1000px;
  margin:auto;
}

/* CARD STAGGER BASE STATE */
.skill-card,
.project-card{
  padding:30px;
  border-radius:25px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.6);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  opacity:0;
  transform:translateY(60px);
  transition:
    opacity 0.6s cubic-bezier(0.22,1,0.36,1),
    transform 0.6s cubic-bezier(0.22,1,0.36,1);
}

body.dark .skill-card,
body.dark .project-card{
  background:rgba(40,40,40,0.7);
}

/* When visible */
.skill-card.show,
.project-card.show{
  opacity:1;
  transform:translateY(0);
}

/* Skill Bars */
.bar{
  margin-top:12px;
  height:8px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
}

body.dark .bar{
  background:#333;
}

.progress{
  height:100%;
  width:0;
  background:linear-gradient(90deg,#4facfe,#00f2fe);
  transition:1.5s ease;
}

/* CONTACT */
.contact-form{
  max-width:600px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.contact-form input,
.contact-form textarea{
  padding:15px;
  border-radius:12px;
  border:none;
  background:#eee;
  transition:0.3s;
}

body.dark .contact-form input,
body.dark .contact-form textarea{
  background:#222;
  color:white;
}

.contact-form button{
  padding:15px;
  border:none;
  border-radius:40px;
  background:#111;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

body.dark .contact-form button{
  background:white;
  color:black;
}

.contact-form button:hover{
  transform:scale(1.08);
}

/* Success message */
#successMsg{
  margin-top:15px;
  color:green;
  font-weight:600;
  opacity:0;        
  transition:opacity 0.5s;
}
#successMsg.show{
  opacity:1;
}

</style>
</head>
<body>

<!-- NAVIGATION AT TOP -->
<div class="floating-nav">
  <a href="#skills">Skills</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
  <div class="toggle" id="themeToggle">🌙</div>
</div>

<section class="hero">
  <div>
    <h1>Hi, I'm Sindhu Lahari </h1>
    <a href="resume.pdf" download class="download-btn">Download CV</a>
  </div>
</section>

<section id="skills" class="section">
  <h2>My Skills</h2>
  <div class="skills-grid">
    <div class="skill-card"><h3>HTML</h3><div class="bar"><div class="progress" data-width="90%"></div></div></div>
    <div class="skill-card"><h3>CSS</h3><div class="bar"><div class="progress" data-width="85%"></div></div></div>
    <div class="skill-card"><h3>Python</h3><div class="bar"><div class="progress" data-width="80%"></div></div></div>
    <div class="skill-card"><h3>Node.js</h3><div class="bar"><div class="progress" data-width="75%"></div></div></div>
    <div class="skill-card"><h3>SQL</h3><div class="bar"><div class="progress" data-width="70%"></div></div></div>
    <div class="skill-card"><h3>Excel</h3><div class="bar"><div class="progress" data-width="85%"></div></div></div>
  </div>
</section>

<section id="projects" class="section">
  <h2>Projects</h2>
  <div class="projects-grid">
    <div class="project-card"><h3>Voice Enabled Weather App</h3></div>
    <div class="project-card"><h3>Smart Room Location System</h3></div>
    <div class="project-card"><h3>Multimodel Chat Bot System</h3></div>
  </div>
</section>

<section id="contact" class="section">
  <h2>Contact Me</h2>
  <form class="contact-form" id="contactForm">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
    <div id="successMsg">Submitted successfully ✅</div>
  </form>
</section>

<script>

/* DARK MODE TOGGLE */
const toggle=document.getElementById("themeToggle");

if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
  toggle.textContent="☀️";
}

toggle.onclick=()=>{
  document.body.classList.toggle("dark");
  toggle.textContent=document.body.classList.contains("dark")?"☀️":"🌙";
  localStorage.setItem("theme",document.body.classList.contains("dark")?"dark":"light");
};

/* STAGGER ANIMATION (FASTER) */
const cards=document.querySelectorAll(".skill-card, .project-card");
const bars=document.querySelectorAll(".progress");

function revealCards(){
  const triggerBottom = window.innerHeight * 0.85;

  cards.forEach((card, index) => {
    const top = card.getBoundingClientRect().top;
    if(top < triggerBottom){
      // faster stagger: index*80ms
      setTimeout(() => { card.classList.add("show"); }, index * 80);
    } else {
      card.classList.remove("show");
    }
  });

  bars.forEach(bar => {
    const top = bar.getBoundingClientRect().top;
    if(top < triggerBottom){
      bar.style.width = bar.dataset.width;
    } else {
      bar.style.width = "0";
    }
  });
}

window.addEventListener("scroll",revealCards);
window.addEventListener("load",revealCards);

/* CONTACT FORM SUBMISSION */
const contactForm = document.getElementById("contactForm");
const successMsg = document.getElementById("successMsg");

contactForm.addEventListener("submit", function(e){
  e.preventDefault();
  contactForm.reset();

  // show success
  successMsg.classList.add("show");

  // hide message & scroll home after 2 seconds
  setTimeout(() => {
    successMsg.classList.remove("show");
    window.scrollTo({ top:0, behavior:"smooth" });
  },2000);
});

</script>

</body>
</html>
